#     --from-literal=ALERT_WEBHOOK_URL=''
apiVersion: v1
kind: Secret
metadata:
  name: queueos-secrets
  namespace: queueos
type: Opaque
stringData:
  DATABASE_URL: "postgresql://queueos:queueos@postgres:5432/queueos?schema=public"
  REDIS_PASSWORD: ""
  DASHBOARD_SECRET: "CHANGE-ME-IN-PROD"
  ALERT_WEBHOOK_URL: ""
