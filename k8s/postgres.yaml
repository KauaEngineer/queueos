apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: queueos-pg-data
  namespace: queueos
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: queueos
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: queueos
            - name: POSTGRES_PASSWORD
              value: queueos
            - name: POSTGRES_DB
              value: queueos
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits: { memory: "512Mi", cpu: "1000m" }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "queueos"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: queueos-pg-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: queueos
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
