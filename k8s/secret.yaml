# Para criar manualmente:
#   kubectl create secret generic queueos-secrets -n queueos \
#     --from-literal=DATABASE_URL='postgresql://user:pass@postgres:5432/queueos' \
#     --from-literal=REDIS_PASSWORD='trocar' \
